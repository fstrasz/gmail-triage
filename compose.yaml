version: "3"
services:
  gmail-triage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gmail-triage
    ports:
      - "3000:3000"
    volumes:
      # App files — bind mounted for live reload
      - ./app/triage.js:/app/triage.js
      # Whole lib dir (not individual files) so new modules — atomicWrite.js,
      # senderList.js, oklist.js, and anything added later — are always present
      # without editing this list. A missing per-file mount was silently crashing
      # the app on every deploy that added a lib module.
      - ./app/lib:/app/lib
      - ./config/activity-log.json:/app/activity-log.json
      - ./config/found-events.json:/app/found-events.json
      # Config & data
      - ./config/.env:/app/.env
      - ./config/credentials.json:/app/credentials.json
      - ./config/token.json:/app/token.json
      - ./config/blocklist.json:/app/blocklist.json
      - ./config/blocklist.backup.json:/app/blocklist.backup.json
      - ./config/blocklist.backups.json:/app/blocklist.backups.json
      - ./config/stats.json:/app/stats.json
      - ./config/keptlist.json:/app/keptlist.json
      - ./config/viplist.json:/app/viplist.json
      - ./config/oklist.json:/app/oklist.json
      - ./config/review.json:/app/review.json
      - ./config/settings.json:/app/settings.json
      - ./config/scan-log.json:/app/scan-log.json
      - ./config/rules.json:/app/rules.json

    stdin_open: true
    tty: true
    restart: unless-stopped