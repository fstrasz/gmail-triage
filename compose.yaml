version: "3"
services:
  gmail-triage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gmail-triage
    ports:
      - "3000:3000"
    volumes:
      # App files — bind mounted for live reload
      - ./app/triage.js:/app/triage.js
      - ./app/lib/stats.js:/app/lib/stats.js
      - ./app/lib/blocklist.js:/app/lib/blocklist.js
      - ./app/lib/gmail.js:/app/lib/gmail.js
      - ./app/lib/unsub.js:/app/lib/unsub.js
      - ./app/lib/html.js:/app/lib/html.js
      - ./app/lib/pages.js:/app/lib/pages.js
      - ./app/lib/keepClean.js:/app/lib/keepClean.js
      - ./app/lib/keptlist.js:/app/lib/keptlist.js
      - ./app/lib/viplist.js:/app/lib/viplist.js
      - ./app/lib/claude.js:/app/lib/claude.js
      - ./app/lib/calendar.js:/app/lib/calendar.js
      - ./app/lib/review.js:/app/lib/review.js
      - ./app/lib/settings.js:/app/lib/settings.js
      - ./app/lib/scheduler.js:/app/lib/scheduler.js
      - ./app/lib/rules.js:/app/lib/rules.js
      - ./app/lib/activityLog.js:/app/lib/activityLog.js
      - ./app/lib/foundEvents.js:/app/lib/foundEvents.js
      - ./app/lib/eventSearch.js:/app/lib/eventSearch.js
      - ./config/activity-log.json:/app/activity-log.json
      # Config & data
      - ./config/.env:/app/.env
      - ./config/credentials.json:/app/credentials.json
      - ./config/token.json:/app/token.json
      - ./config/blocklist.json:/app/blocklist.json
      - ./config/stats.json:/app/stats.json
      - ./config/keptlist.json:/app/keptlist.json
      - ./config/viplist.json:/app/viplist.json
      - ./config/oklist.json:/app/oklist.json
      - ./config/review.json:/app/review.json
      - ./config/settings.json:/app/settings.json
      - ./config/scan-log.json:/app/scan-log.json

    restart: unless-stopped